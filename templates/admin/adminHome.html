<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen AI Translation Generator</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Three.js for 3D Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #00e0ff; /* Bright Cyan */
            --secondary-color: #ff007a; /* Vibrant Magenta */
            --accent-color: #00ff85; /* Neon Green */
            --text-color: #ffffff; /* Pure White */
            --bg-gradient: linear-gradient(135deg, #ff3cac, #784ba0, #2b86c5, #00f260); /* Colorful Gradient */
            --shadow: 0 0 12px rgba(0, 224, 255, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
            color: var(--text-color);
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Gradient */
        @keyframes gradientFlow {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* Particle Background */
        .particle-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 8px var(--accent-color), 0 0 12px rgba(255, 60, 172, 0.5);
            animation: driftParticle 12s linear infinite;
        }

        @keyframes driftParticle {
            0% {
                transform: translate(0, 0);
                opacity: 0.3;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                transform: translate(100vw, -100vh);
                opacity: 0.3;
            }
        }

        /* Floating Translation Icons */
        .falling-fruit {
            position: absolute;
            width: 35px;
            height: 35px;
            background-size: contain;
            background-repeat: no-repeat;
            animation: floatTranslate 7s ease-in-out infinite;
            opacity: 0.7;
            filter: drop-shadow(0 0 6px var(--secondary-color));
        }

        .falling-fruit.translate {
            background-image: url('https://img.icons8.com/fluency/48/000000/translate.png');
            animation-delay: 0s;
        }

        .falling-fruit.globe {
            background-image: url('https://img.icons8.com/fluency/48/000000/globe.png');
            animation-delay: 1.5s;
        }

        .falling-fruit.language {
            background-image: url('https://img.icons8.com/fluency/48/000000/language.png');
            animation-delay: 3s;
        }

        @keyframes floatTranslate {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0.7;
            }
            50% {
                transform: translateY(20px) translateX(8px);
                opacity: 0.9;
            }
            100% {
                transform: translateY(0) translateX(0);
                opacity: 0.7;
            }
        }

        /* Three.js Animation Container */
        .threejs-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }

        /* Animations */
        @keyframes neonGlow {
            0%, 100% { box-shadow: 0 0 8px var(--primary-color); }
            50% { box-shadow: 0 0 18px var(--primary-color); }
        }

        @keyframes pulseScale {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        @keyframes textFlicker {
            0% { opacity: 1; }
            20% { opacity: 0.85; }
            40% { opacity: 1; }
            60% { opacity: 0.9; }
            100% { opacity: 1; }
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(90deg, rgba(10, 28, 51, 0.9), rgba(30, 58, 95, 0.9));
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 10;
            padding: 12px 15px;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            color: var(--text-color);
            font-weight: 700;
            font-size: 1.7em;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .nav-logo:hover {
            transform: scale(1.05);
            text-shadow: 0 0 6px var(--accent-color);
        }

        .translate-icon {
            width: 30px;
            height: 30px;
            margin-right: 8px;
            filter: drop-shadow(0 0 4px var(--primary-color));
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-btn {
            color: var(--text-color);
            text-decoration: none;
            font-size: 1em;
            padding: 8px 18px;
            border-radius: 20px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            transition: all 0.3s ease;
            position: relative;
            animation: pulseScale 2.5s infinite;
        }

        .nav-btn:hover {
            background: linear-gradient(45deg, var(--secondary-color), var(--accent-color));
            transform: translateY(-2px);
            box-shadow: 0 0 10px var(--accent-color);
        }

        .nav-btn.active {
            background: linear-gradient(45deg, var(--secondary-color), var(--accent-color));
            box-shadow: 0 0 10px var(--accent-color);
        }

        .nav-btn::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -3px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-color);
            transition: width 0.3s ease;
        }

        .nav-btn:hover::after {
            width: 80%;
        }

        .menu-toggle {
            display: none;
            font-size: 1.4em;
            cursor: pointer;
            color: var(--text-color);
            padding: 8px;
        }

        /* Hero Section */
        .hero-section {
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 1;
        }

        .hero-content {
            background: linear-gradient(135deg, rgba(10, 28, 51, 0.85), rgba(30, 58, 95, 0.85));
            border-radius: 12px;
            padding: 25px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
            max-width: 700px;
        }

        .hero-content h1 {
            font-size: 4em;
            font-weight: 700;
            color: var(--text-color);
            text-shadow: 0 0 10px var(--primary-color);
            animation: textFlicker 3s ease-in-out infinite;
        }

        .hero-content p {
            font-size: 1.6em;
            margin: 15px 0;
            color: var(--text-color);
            max-width: 550px;
            text-align: center;
            opacity: 0;
            animation: fadeIn 1.5s ease-in-out 0.5s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .cta-button {
            display: inline-block;
            padding: 12px 35px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: var(--text-color);
            text-decoration: none;
            border-radius: 30px;
            font-size: 1.2em;
            font-weight: 600;
            transition: all 0.3s ease;
            animation: neonGlow 2s infinite;
            box-shadow: var(--shadow);
        }

        .cta-button:hover {
            background: linear-gradient(45deg, var(--secondary-color), var(--accent-color));
            transform: scale(1.08);
            box-shadow: 0 0 15px var(--accent-color);
        }

        /* Footer */
        .footer-gradient {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            padding: 30px 15px;
            text-align: center;
        }

        .footer-container p {
            margin: 0;
            font-size: 0.9em;
            color: var(--text-color);
            text-shadow: 0 0 3px var(--accent-color);
        }

        .footer-container .social-icons {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .footer-container .social-icons a {
            color: var(--text-color);
            font-size: 1.4em;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .footer-container .social-icons a:hover {
            color: var(--accent-color);
            transform: scale(1.15);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .nav-menu {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 60px;
                right: 15px;
                background: linear-gradient(135deg, rgba(10, 28, 51, 0.95), rgba(30, 58, 95, 0.95));
                padding: 15px;
                border-radius: 8px;
                box-shadow: var(--shadow);
            }

            .nav-menu.active {
                display: flex;
            }

            .menu-toggle {
                display: block;
            }

            .particle, .falling-fruit {
                display: none;
            }

            .hero-content h1 {
                font-size: 2.8em;
            }

            .hero-content p {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <!-- Particle and Floating Translation Icons Background -->
    <div class="particle-bg">
        <div class="particle" style="top: 15%; left: 10%; animation-delay: 0s;"></div>
        <div class="particle" style="top: 25%; left: 20%; animation-delay: 2s;"></div>
        <div class="particle" style="top: 35%; left: 30%; animation-delay: 4s;"></div>
        <div class="particle" style="top: 45%; left: 40%; animation-delay: 6s;"></div>
        <div class="particle" style="top: 55%; left: 50%; animation-delay: 8s;"></div>
        <div class="particle" style="top: 65%; left: 60%; animation-delay: 10s;"></div>
        <div class="particle" style="top: 75%; left: 70%; animation-delay: 12s;"></div>
        <div class="particle" style="top: 85%; left: 80%; animation-delay: 14s;"></div>
        <div class="particle" style="top: 95%; left: 90%; animation-delay: 16s;"></div>
        <div class="falling-fruit translate" style="left: 15%; animation-delay: 0s;"></div>
        <div class="falling-fruit globe" style="left: 35%; animation-delay: 1s;"></div>
        <div class="falling-fruit language" style="left: 55%; animation-delay: 2s;"></div>
        <div class="falling-fruit translate" style="left: 75%; animation-delay: 3s;"></div>
        <div class="falling-fruit globe" style="left: 95%; animation-delay: 4s;"></div>
    </div>

    <!-- Three.js Animation Container -->
    <div class="threejs-container" id="threejs-scene"></div>

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo">
                <svg class="translate-icon" viewBox="0 0 32 32">
                    <path fill="url(#nav-gradient)" d="M16 2C8.3 2 2 8.3 2 16s6.3 14 14 14 14-6.3 14-14S23.7 2 16 2zm0 26C9.4 28 4 22.6 4 16S9.4 4 16 4s12 5.4 12 12-5.4 12-12 12zm6-18h-4v2h4v2h-6v2h6v2h-4v2h4v2h-6v2h6c1.1 0 2-.9 2-2v-8c0-1.1-.9-2-2-2zm-8 10H8v-2h6v-2H8v-2h4v-2H8v-2h6c1.1 0 2 .9 2 2v6c0 1.1-.9 2-2 2z"/>
                    <defs>
                        <linearGradient id="nav-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#00e0ff;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#ff007a;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                </svg>
               AI Based Technique for Language Translation
            </a>
            <div class="menu-toggle" id="mobileMenu">☰</div>
            <div class="nav-menu" id="navMenu">
                <a href="adminHome" class="nav-btn"><i class="fas fa-home mr-1"></i>Home</a>
                <a href="userList" class="nav-btn"><i class="fas fa-user mr-1"></i>User Details</a>
                <a href="log" class="nav-btn"><i class="fas fa-sign-out-alt mr-1"></i>Log Out</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero-section">
        <div class="hero-content">
            <h1>AI Translation Dashboard</h1>
            <p>Seamless Multilingual Translation Powered by Advanced AI</p>
            <a href="userList" class="cta-button">View User Details</a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer-gradient">
        <div class="footer-container">
            <p>© 2025 GenAITranslation. All rights reserved.</p>
            <div class="social-icons">
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-linkedin"></i></a>
                <a href="#"><i class="fab fa-github"></i></a>
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script>
        // Mobile Menu Toggle
        const mobileMenu = document.getElementById('mobileMenu');
        const navMenu = document.getElementById('navMenu');
        mobileMenu.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });

        // Active Link Highlight
        const navLinks = document.querySelectorAll('.nav-btn');
        navLinks.forEach(link => {
            const href = link.getAttribute('href');
            if (href === window.location.pathname || (window.location.pathname === '/' && href === 'adminHome')) {
                link.classList.add('active');
            }
        });

        // Three.js Animation: 3D Translation Nodes
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('threejs-scene').appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 0.5);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // 3D Translation Nodes (Multiple Icosahedrons for Translation Theme)
        const nodes = [];
        const nodeColors = [0x00e0ff, 0xff007a, 0x00ff85]; // Cyan, Magenta, Green
        for (let i = 0; i < 3; i++) {
            const geometry = new THREE.IcosahedronGeometry(0.8, 0);
            const material = new THREE.MeshPhongMaterial({
                color: nodeColors[i],
                shininess: 60,
                specular: 0xFFFFFF
            });
            const node = new THREE.Mesh(geometry, material);
            node.position.set((i - 1) * 2, 0, 0);
            scene.add(node);
            nodes.push(node);
        }

        camera.position.z = 5;

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            nodes.forEach((node, index) => {
                node.rotation.x += 0.015;
                node.rotation.y += 0.015;
                node.position.y = Math.sin(Date.now() * 0.001 + index) * 0.6;
            });
            renderer.render(scene, camera);
        }
        animate();

        // Resize Handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
